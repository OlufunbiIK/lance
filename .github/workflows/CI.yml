name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Dummy variables for tests/builds that might expect them
  DATABASE_URL: postgresql://postgres@localhost/lance
  NEXT_PUBLIC_E2E: "true"

jobs:
  rust:
    name: Rust (Workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build Contracts
        run: cargo build --target wasm32-unknown-unknown --release -p escrow -p reputation -p job_registry

  web-lint-build:
    name: Web Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm install --prefix apps/web
      - name: Lint
        run: npm run lint --prefix apps/web
      - name: Build
        run: npm run build --prefix apps/web

  playwright-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install root dependencies
        run: npm install
      - name: Install web dependencies
        run: npm install --prefix apps/web
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_E2E: "true"
          NEXT_PUBLIC_API_URL: "http://localhost:3001"
